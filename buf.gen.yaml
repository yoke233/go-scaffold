version: v2
inputs:
  - directory: api
plugins:
  - local: protoc-gen-go
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-go-http
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-go-errors
    out: gen
    opt: paths=source_relative
