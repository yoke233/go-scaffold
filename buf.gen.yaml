version: v2
inputs:
  - directory: api
plugins:
  - local: protoc-gen-go
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-go-http
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-go-errors
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-openapi
    out: docs/openapi
    opt: output_mode=source_relative,fq_schema_naming=true
