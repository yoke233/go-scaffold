app:
  name: "go-scaffold"
  env: "local"

log:
  level: "info"

auth:
  jwt:
    issuer: "go-scaffold"
    signing_key: "dev-secret-change-me"
    access_token_ttl: "2h"

server:
  http:
    addr: "0.0.0.0:8080"
  grpc:
    addr: "0.0.0.0:9090"
data:
  database:
    dsn: "postgres://postgres:postgres@localhost:5432/project?sslmode=disable"
