syntax = "proto3";

package user.v1;

option go_package = "project/gen/user/v1;userv1";

import "errors/errors.proto";

enum ErrorReason {
  option (errors.default_code) = 500;

  ERROR_REASON_UNSPECIFIED          = 0;
  ERROR_REASON_USER_NOT_FOUND       = 1 [(errors.code) = 404];
  ERROR_REASON_USER_ALREADY_EXISTS  = 2 [(errors.code) = 409];
}
