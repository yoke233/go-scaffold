services:
  postgres:
    image: postgres:16-alpine
    container_name: go-scaffold-postgres
    environment:
      POSTGRES_DB: project
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d project"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
